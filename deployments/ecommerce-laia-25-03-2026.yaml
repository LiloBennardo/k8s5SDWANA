---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ecommerce-laia-25-03-2026
  labels:
    app: ecommerce-laia-25-03-2026
  namespace: ecommerce-laia-25-03-2026
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ecommerce-laia-25-03-2026
  template:
    metadata:
      labels:
        app: ecommerce-laia-25-03-2026
    spec:
      containers:
      - name: ecommerce-laia-25-03-2026
        image: tomcruise57/rocket-ecommerce-lia-25-03-2026:latest
        # --- MODIFICATION ICI ---
        # On force Gunicorn avec un timeout de 120 secondes
        command: ["gunicorn"]
        args: ["core.wsgi:application", "--bind", "0.0.0.0:5085", "--timeout", "120"]
        # ------------------------
        imagePullPolicy: Always
        ports:
          - containerPort: 5085
        resources:
          requests:
            memory: 64Mi
            cpu: 100m
          limits:
            memory: 512Mi
            cpu: 450m
        envFrom:
        - secretRef:
            name: ecommerce-secret-laia-25-03-2026
        - configMapRef:
            name: ecommerce-configmap-laia-25-03-2026
