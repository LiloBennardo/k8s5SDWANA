apiVersion: v1
kind: Namespace
metadata:
  name: ecommerce-laia-25-03-2026
  labels:
    name: ecommerce-laia-25-03-2026
---
apiVersion: v1
kind: Service
metadata:
  name: ecommerce-svc-laia-25-03-2026
  labels:
    app: ecommerce-svc-laia-25-03-2026
  namespace: ecommerce-laia-25-03-2026
spec:
  type: LoadBalancer
  selector:
    app: ecommerce-laia-25-03-2026
  ports:
  - port: 5085
    protocol: TCP
    targetPort: 5085
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ecommerce-configmap-laia-25-03-2026
  namespace: ecommerce-laia-25-03-2026
data:
  DEBUG: "True"
  DEMO_MODE: "True"
  SERVER_ADDRESS: "http://127.0.0.1:40147/"
---
apiVersion: v1
kind: Secret
metadata:
  name: ecommerce-secret-laia-25-03-2026
  namespace: ecommerce-laia-25-03-2026
