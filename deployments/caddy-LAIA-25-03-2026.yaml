apiVersion: v1
kind: Namespace
metadata:
  name: caddy-laia-25-03-2026
  labels:
    name: caddy-laia-25-03-2026
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: caddy-config-laia-25-03-2026
  namespace: caddy-laia-25-03-2026
data:
  Caddyfile: |
    {
      admin off
    }

    :80 {
      reverse_proxy ecommerce-svc-laia-25-03-2026.ecommerce-laia-25-03-2026.svc.cluster.local:5085 {
        header_up Host {host}
        header_up X-Real-IP {remote_host}
        header_up X-Forwarded-For {remote_host}
        header_up X-Forwarded-Proto {scheme}
      }
      log {
        output stdout
        format json
      }
    }

    :9090 {
      respond /healthz 200
    }
---
apiVersion: v1
kind: Service
metadata:
  name: caddy-svc-laia-25-03-2026
  labels:
    app: caddy-svc-laia-25-03-2026
  namespace: caddy-laia-25-03-2026
spec:
  type: LoadBalancer
  selector:
    app: caddy-laia-25-03-2026
  ports:
  - port: 80
    protocol: TCP
    targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: caddy-laia-25-03-2026
  labels:
    app: caddy-laia-25-03-2026
  namespace: caddy-laia-25-03-2026
spec:
  replicas: 3
  selector:
    matchLabels:
      app: caddy-laia-25-03-2026
  template:
    metadata:
      labels:
        app: caddy-laia-25-03-2026
    spec:
      containers:
      - name: caddy-laia-25-03-2026
        image: caddy:2-alpine
        imagePullPolicy: Always
        ports:
          - containerPort: 80
          - containerPort: 9090
        volumeMounts:
          - name: caddy-config-laia-25-03-2026
            mountPath: /etc/caddy/Caddyfile
            subPath: Caddyfile
          - name: caddy-data
            mountPath: /data
          - name: caddy-config-dir
            mountPath: /config
        resources:
          requests:
            memory: 64Mi
            cpu: 100m
          limits:
            memory: 256Mi
            cpu: 300m
        readinessProbe:
          httpGet:
            path: /healthz
            port: 9090
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
        - name: caddy-config-laia-25-03-2026
          configMap:
            name: caddy-config-laia-25-03-2026
        - name: caddy-data
          emptyDir: {}
        - name: caddy-config-dir
          emptyDir: {}
